<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="/static/">
  <title>The Ages II</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Connection Status -->
  <div id="connection-status">
    <span id="status-dot" class="dot dot-disconnected"></span>
    <span id="status-text">Disconnected</span>
  </div>

  <!-- Auth Screen -->
  <div id="auth-screen">
    <div class="auth-card">
      <h1>The Ages II</h1>
      <div id="auth-message"></div>

      <div class="auth-section">
        <h2>Register</h2>
        <form id="register-form">
          <input type="text" id="reg-username" placeholder="Username (3+ chars)" minlength="3" required>
          <input type="password" id="reg-password" placeholder="Password (6+ chars)" minlength="6" required>
          <button type="submit">Register</button>
        </form>
      </div>

      <div class="auth-divider">or</div>

      <div class="auth-section">
        <h2>Login</h2>
        <form id="login-form">
          <input type="text" id="login-username" placeholder="Username" required>
          <input type="password" id="login-password" placeholder="Password" required>
          <button type="submit">Login</button>
        </form>
      </div>

      <div id="auth-error" class="error-text"></div>
    </div>
  </div>

  <!-- Game Screen -->
  <div id="game-screen" class="hidden">
    <!-- Left Panel: Stats & Inventory -->
    <div id="left-panel">
      <div class="panel-section">
        <h3>Player</h3>
        <div id="player-name"></div>
        <div id="player-position"></div>
        <div id="room-name"></div>
        <button id="btn-logout" class="btn-logout">Logout</button>
      </div>

      <div class="panel-section">
        <h3>Stats</h3>
        <div id="stats-display">
          <div id="hp-section">
            <div class="stat-label">HP</div>
            <div class="hp-bar-track">
              <div id="hp-bar" class="hp-bar-fill"></div>
            </div>
            <div id="hp-text" class="stat-value"></div>
          </div>
          <div id="energy-section">
            <div class="stat-label">Energy</div>
            <div class="energy-bar-track">
              <div id="energy-bar" class="energy-bar-fill"></div>
            </div>
            <div id="energy-text" class="stat-value"></div>
          </div>
          <div id="shield-section" class="hidden">
            <div class="stat-label">Shield</div>
            <div id="shield-text" class="stat-value"></div>
          </div>
          <div id="level-section">
            <div class="stat-label">LVL</div>
            <div id="level-text" class="stat-value">1</div>
            <span id="levelup-badge" class="hidden">Level Up!</span>
          </div>
          <div id="xp-section">
            <div class="stat-label">XP</div>
            <div class="xp-bar-track">
              <div id="xp-bar" class="xp-bar-fill"></div>
              <span id="xp-text" class="xp-bar-text">0/1000</span>
            </div>
          </div>
        </div>
        <button id="stats-toggle-btn">Stats</button>
        <div id="stats-detail-panel" class="hidden">
          <div class="stat-row" id="stat-str"></div>
          <div class="stat-row" id="stat-dex"></div>
          <div class="stat-row" id="stat-con"></div>
          <div class="stat-row" id="stat-int"></div>
          <div class="stat-row" id="stat-wis"></div>
          <div class="stat-row" id="stat-cha"></div>
        </div>
      </div>

      <div class="panel-section">
        <h3>Inventory</h3>
        <div id="inventory-list"></div>
      </div>
    </div>

    <!-- Center Panel: Game Viewport -->
    <div id="center-panel">
      <div id="move-error" class="hidden"></div>
      <div id="game-viewport">
        <div id="tile-grid"></div>
      </div>
      <div id="map-legend">
        <span class="legend-item"><span class="legend-icon entity-self">@</span> You</span>
        <span class="legend-item"><span class="legend-icon entity-player">@</span> Player</span>
        <span class="legend-item"><span class="legend-icon entity-npc-hostile">!</span> Mob</span>
        <span class="legend-item"><span class="legend-icon entity-npc-dead">x</span> Dead</span>
        <span class="legend-item"><span class="legend-swatch tile-floor"></span> Floor</span>
        <span class="legend-item"><span class="legend-swatch tile-wall"></span> Wall</span>
        <span class="legend-item"><span class="legend-swatch tile-exit"></span> Exit</span>
        <span class="legend-item"><span class="legend-swatch tile-water"></span> Water</span>
        <span class="legend-item"><span class="legend-swatch tile-stairs-up"></span> Stairs Up</span>
        <span class="legend-item"><span class="legend-swatch tile-stairs-down"></span> Stairs Down</span>
        <span class="legend-item"><span class="legend-icon entity-object-interactive">&squarf;</span> Chest</span>
        <span class="legend-item"><span class="legend-icon entity-object-rock">&bull;</span> Rock</span>
      </div>
    </div>

    <!-- Right Panel: Chat & Message Log -->
    <div id="right-panel">
      <div class="panel-section chat-section">
        <h3>Chat</h3>
        <div id="chat-log"></div>
        <div id="chat-input-area">
          <select id="whisper-target">
            <option value="">Room (all)</option>
          </select>
          <input type="text" id="chat-input" placeholder="Type a message...">
          <button id="chat-send">Send</button>
        </div>
      </div>

      <div class="panel-section">
        <div class="collapsible-header" id="msglog-toggle">
          <h3>Message Log</h3>
          <span class="toggle-icon">▼</span>
        </div>
        <div id="message-log" class="collapsed"></div>
      </div>
    </div>
  </div>

  <!-- Combat Overlay -->
  <div id="combat-overlay" class="hidden">
    <div id="combat-panel">
      <h2>Combat</h2>
      <div id="combat-status"></div>

      <div id="mob-info">
        <div id="mob-name"></div>
        <div class="hp-bar-track">
          <div id="mob-hp-bar" class="hp-bar-fill"></div>
        </div>
        <div id="mob-hp-text"></div>
      </div>

      <div id="combat-player-info">
        <div id="combat-player-name"></div>
        <div class="hp-bar-track">
          <div id="combat-hp-bar" class="hp-bar-fill"></div>
        </div>
        <div id="combat-hp-text"></div>
        <div class="energy-bar-track">
          <div id="combat-energy-bar" class="energy-bar-fill"></div>
        </div>
        <div id="combat-energy-text"></div>
        <div id="combat-energy-regen" class="stat-value"></div>
        <div id="combat-shield-text"></div>
      </div>

      <div id="combat-result"></div>

      <div id="card-hand"></div>

      <div id="combat-actions">
        <button id="btn-pass-turn">Pass Turn</button>
        <button id="btn-flee">Flee</button>
      </div>

      <div id="combat-inventory">
        <h4>Items</h4>
        <div id="combat-inventory-list"></div>
      </div>
    </div>
  </div>

  <!-- Level-Up Overlay -->
  <div id="levelup-overlay" class="hidden">
    <div id="levelup-panel">
      <button id="levelup-close-btn">&times;</button>
      <h2>Level Up!</h2>
      <p id="levelup-subtitle">Choose up to 3 stats to improve:</p>
      <div id="levelup-stats-grid"></div>
      <div id="levelup-feedback"></div>
      <button id="levelup-confirm-btn" disabled>Confirm</button>
    </div>
  </div>

  <script src="js/game.js"></script>
</body>
</html>
